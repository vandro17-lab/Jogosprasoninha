<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="currentColor" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round">
  <!-- Stem -->
  <path d="M60 110 C 55 90, 50 75, 48 55" opacity="0.55"/>
  <path d="M48 70 C 40 68, 32 70, 28 76" opacity="0.45"/>
  <path d="M50 60 C 58 56, 64 56, 70 60" opacity="0.45"/>

  <!-- Main flower -->
  <g transform="translate(48 48)">
    <ellipse cx="0" cy="-10" rx="6" ry="10" opacity="0.7"/>
    <ellipse cx="9.5" cy="-3" rx="6" ry="10" transform="rotate(72 9.5 -3)" opacity="0.7"/>
    <ellipse cx="6" cy="8.5" rx="6" ry="10" transform="rotate(144 6 8.5)" opacity="0.7"/>
    <ellipse cx="-6" cy="8.5" rx="6" ry="10" transform="rotate(216 -6 8.5)" opacity="0.7"/>
    <ellipse cx="-9.5" cy="-3" rx="6" ry="10" transform="rotate(288 -9.5 -3)" opacity="0.7"/>
    <circle cx="0" cy="0" r="3" fill="currentColor" stroke="none" opacity="0.85"/>
  </g>

  <!-- Small bud -->
  <g transform="translate(82 76)">
    <ellipse cx="0" cy="-5" rx="3.5" ry="6" opacity="0.6"/>
    <ellipse cx="5.5" cy="-1" rx="3.5" ry="6" transform="rotate(72 5.5 -1)" opacity="0.6"/>
    <ellipse cx="3.5" cy="5" rx="3.5" ry="6" transform="rotate(144 3.5 5)" opacity="0.6"/>
    <ellipse cx="-3.5" cy="5" rx="3.5" ry="6" transform="rotate(216 -3.5 5)" opacity="0.6"/>
    <ellipse cx="-5.5" cy="-1" rx="3.5" ry="6" transform="rotate(288 -5.5 -1)" opacity="0.6"/>
    <circle cx="0" cy="0" r="1.6" fill="currentColor" stroke="none" opacity="0.8"/>
  </g>

  <!-- Loose petals -->
  <ellipse cx="22" cy="90" rx="3" ry="6" transform="rotate(-30 22 90)" opacity="0.55"/>
  <ellipse cx="95" cy="40" rx="2.6" ry="5" transform="rotate(40 95 40)" opacity="0.55"/>
  <circle cx="100" cy="98" r="1.2" fill="currentColor" stroke="none" opacity="0.5"/>
  <circle cx="15" cy="35" r="1.2" fill="currentColor" stroke="none" opacity="0.5"/>
</svg>
